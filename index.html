<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/home-page.css">
    <link rel="stylesheet" href="/assets/css/components/_navigator.css">

    <title>Spider Man Multiverso</title>
</head>

<body>
    <nav class="s-menu">
        <ul>
            <li class="s-menu__item">
                <a href="index.html">Página Inicial</a>
            </li>
            <li class="s-menu__item">
                <a href="pages/tobey-maguire/spiderman1.html">Tobey Maguire</a>
            </li>
            <li class="s-menu__item s-menu__icon">
                <img src="assets/img/icons/spider.svg" alt="Logo Homen Aranha">
            </li>
            <li class="s-menu__item">
                <a href="pages/andrew-garfield/spiderman1.html">Andrew Garfield</a>
            </li>
            <li class="s-menu__item">
                <a href="pages/tom-holland/spiderman1.html">Tom Holland</a>
            </li>
        </ul>
    </nav>

    <section class="s-container">
        <div class="s-cards-carousel" style="transform: translateZ(-40vw) rotateY(0deg);">
            <a href="./pages/tobey-maguire/spiderman1.html" class="s-card" id="spider-man-01">
                <img class="s-card__background" src="./assets/img/pic-sm-bg-01.jpg"
                    alt="Imagem de fundo, predio de nova york com ponte em cima">
                <img class="s-card__image" src="./assets/img/spider-man-01.png"
                    alt="Homen aranha Tobey de cabeça para baixo">
                <h2>Tobey Maguire</h2>
            </a>
            <a href="./pages/adrew-garfield/spiderman1.html" class="s-card" id="spider-man-02">
                <img class="s-card__background" src="./assets/img/pic-sm-bg-03.jpg"
                    alt="Imagem de fundo, rua de nova york com ponte no fundo">
                <img class="s-card__image" src="./assets/img/spider-man-03.png" alt="Homen aranha Andrew jogando teia">
                <h2>Andrew Garfield</h2>
            </a>
            <a href="./pages/tom-holland/spiderman1.html" class="s-card" id="spider-man-03">
                <img class="s-card__background" src="./assets/img/pic-sm-bg-02.jpg"
                    alt="Imagem de fundo, rua de nova york">
                <img class="s-card__image" src="./assets/img/spider-man-02.png" alt="Homem aranha Tom saltando">
                <h2>Tom Holland</h2>
            </a>
        </div>
    </section>
    <div class="s-controller">
        <div id="1" onclick="selectCarouselItem(this)" class="s-controller__button s-controller__button--active">
            01
        </div>
        <div id="2" onclick="selectCarouselItem(this)" class="s-controller__button">
            02
        </div>
        <div id="3" onclick="selectCarouselItem(this)" class="s-controller__button">
            03
        </div>
        <div class="s-controller__line"></div>
    </div>

    <script src="/assets/js/index.js"></script>
</body>

</html>
